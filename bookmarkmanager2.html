<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Bookmark Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>My Bookmarks</h1>
  </header>
  <main>
    <section id="add-bookmark">
      <h2>Add a Bookmark</h2>
      <form id="bookmark-form">
        <input type="text" id="bookmark-title" placeholder="Title" required>
        <input type="url" id="bookmark-url" placeholder="https://example.com" required>
        <!-- expanded category chooser -->
        <select id="bookmark-category">
          <option value="primary">Primary</option>
          <option value="secondary">Secondary</option>
          <option value="tertiary">Tertiary</option>
          <option value="work">Work</option>
          <option value="personal">Personal</option>
          <option value="other">Other</option>
        </select>
        <button type="submit">Add</button>
      </form>
    </section>

    <!-- bookmarks are now rendered dynamically in script.js -->
    <div id="bookmarks-list"></div>
  </main>
  <footer>
    <button id="clear-all">Clear All</button>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
